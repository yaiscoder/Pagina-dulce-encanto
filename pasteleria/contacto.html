<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Dulce Encanto</title>
    <link rel="icon" href="imagenes/icono-principal.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>PASTELERIA: Dulce Encanto</h1>
        <h3>Pasteles que hacen latir el corazón.</h3>
        <nav>
            <ul>
                <li><a href="quienesomos.html">¿QUIENES SOMOS?</a></li>
                <li><a href="serviciosyproductos.html">SERVICIOS Y PRODUCTOS</a></li>
                <li><a href="contacto.html">CONTACTO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contactanos</h1>
        <section id="contact">
            <aside>
                <a href="#" class="boton-contacto">WhatsApp</a>
                <a href="#" class="boton-contacto">Paga en linea</a>
                <a href="#" class="boton-contacto">Rappi</a>
                <a href="#" class="boton-contacto">Instagram</a>
                <a href="#" class="boton-contacto">Tik Tok</a>
                <a href="#" class="boton-contacto">Facebook</a>
            </aside><br><br>
            <article id="formulario">
                <form action="contacto.html" method="get">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required><br><br>

                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" required><br><br>

                    <label for="telefono">Telefono</label>
                    <input type="number" id="telefono" name="telefono" required min="1"><br><br>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required><br><br>

                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje"></textarea><br><br>

                    <button type="submit">Enviar</button><br><br>
                </form>
            </article>
            <article id="mapa">
                <h2>¿Donde encontrarnos?</h2>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3268.9884793996825!2d-74.78323822590968!3d10.988534555247467!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8ef42d0025832995%3A0x6ee5ef55547f7da6!2sRiwi!5e1!3m2!1sen!2sco!4v1776049794708!5m2!1sen!2sco" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </article><br><br>
        </section>
    </main>
    <section><a class="regresar" href="index.html">Volver al portafolio</a></section>
    <br><br>
    <footer class="copy">© 2026 Dulce Encanto</footer>
</body>
</html>
